# Pre-commit hooks — STY-001 §9.2, TST-001 §10.4, INIT-010 FEAT-077
# Advisory development-time quality gate (not authoritative — see compliance runner)
repos:
  # CHG-001 §7.1.1: Block commits unless a ChangeRequest is in_progress
  - repo: local
    hooks:
      - id: check-cr
        name: CHG-001 ChangeRequest check
        entry: python3 ops/hooks/check_cr.py
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]
      # SEC-001 §6.6: Tenant isolation lint — catches unscoped Site/Project lookups
      - id: tenant-isolation-lint
        name: SEC-001 tenant isolation lint
        entry: python3 ops/hooks/check_tenant_isolation.py
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]
      # SEC-001 §7: Secret leak prevention — blocks hardcoded keys/passwords
      - id: check-secrets
        name: SEC-001 secret leak prevention
        entry: python3 ops/hooks/check_secrets.py
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]
      # NTF-001: Email service enforcement — blocks direct send_mail() imports
      - id: check-email
        name: NTF-001 email service enforcement
        entry: python3 ops/hooks/check_email.py
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]
      # OPS-001: Debug statement detection — blocks breakpoint/pdb/print
      - id: check-debug
        name: OPS-001 debug statement detection
        entry: python3 ops/hooks/check_debug.py
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]
      # AUDIT-2026-03-29: Race condition prevention — catches self.field += N; self.save()
      - id: check-nonatomic-writes
        name: DAT-001 non-atomic write detection
        entry: python3 ops/hooks/check_nonatomic_writes.py
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix, --exit-zero]
      - id: ruff-format
