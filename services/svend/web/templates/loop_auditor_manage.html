{% extends "base_app.html" %}
{% block title %}Auditor Portal — Token Management{% endblock %}

{% block extra_head %}
<style>
.atm-app { padding: 24px; max-width: 800px; margin: 0 auto; }
.atm-header { margin-bottom: 24px; }
.atm-header h1 { font-size: 22px; font-weight: 500; color: var(--text-primary); margin: 0; }
.atm-header .subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

.atm-section { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
.atm-section-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); margin-bottom: 12px; }

/* Create form */
.atm-form { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: end; }
@media (max-width: 640px) { .atm-form { grid-template-columns: 1fr; } }
.atm-field label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.atm-input { width: 100%; padding: 8px 12px; background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-primary); font-size: 13px; box-sizing: border-box; font-family: inherit; }
.atm-input:focus { border-color: var(--accent); outline: none; }
.atm-btn { padding: 8px 16px; background: var(--accent); border: none; border-radius: 6px;
    color: white; font-size: 13px; cursor: pointer; font-weight: 500; white-space: nowrap; }
.atm-btn:hover { opacity: 0.9; }
.atm-btn.danger { background: transparent; border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
.atm-btn.danger:hover { background: rgba(239,68,68,0.15); }
.atm-btn.sm { padding: 4px 10px; font-size: 11px; }

/* Token list */
.atm-token { padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.atm-token:last-child { border-bottom: none; }
.atm-token-header { display: flex; justify-content: space-between; align-items: center; }
.atm-token-label { font-size: 14px; font-weight: 500; color: var(--text-primary); }
.atm-token-meta { font-size: 11px; color: var(--text-secondary); margin-top: 4px; display: flex; gap: 16px; flex-wrap: wrap; }
.atm-token-url { margin-top: 8px; display: flex; align-items: center; gap: 8px; }
.atm-token-url input { flex: 1; padding: 6px 10px; background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 4px; color: var(--accent); font-size: 12px; font-family: 'JetBrains Mono', monospace; }
.atm-token-url button { padding: 6px 10px; background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text-secondary); font-size: 11px; cursor: pointer; }
.atm-badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
.atm-badge.valid { background: rgba(74,222,128,0.15); color: #4ade80; }
.atm-badge.expired { background: rgba(239,68,68,0.15); color: #f87171; }
.atm-badge.revoked { background: var(--bg-secondary); color: var(--text-dim); }

.atm-empty { text-align: center; padding: 40px; color: var(--text-dim); font-size: 13px; }

/* Toast */
.atm-toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; background: var(--card-bg); border: 1px solid #4ade80;
    border-radius: 8px; font-size: 13px; color: var(--text-primary); z-index: 2000; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
.atm-toast.show { transform: translateY(0); opacity: 1; }
</style>
{% endblock %}

{% block content %}
<div class="atm-app" id="atmApp">
    <div class="atm-header">
        <h1>Auditor Portal</h1>
        <div class="subtitle">LOOP-001 &sect;11 &mdash; Generate time-limited access links for external auditors</div>
    </div>

    <div class="atm-section">
        <div class="atm-section-title">Generate New Token</div>
        <div class="atm-form">
            <div class="atm-field">
                <label>Label</label>
                <input class="atm-input" id="newLabel" placeholder="e.g. ISO 9001 Surveillance — BSI March 2026">
            </div>
            <div class="atm-field">
                <label>Expires in (days)</label>
                <input class="atm-input" id="newDays" type="number" value="30" min="1" max="365" style="width:80px;">
            </div>
            <button class="atm-btn" onclick="createToken()">Generate Link</button>
        </div>
    </div>

    <div class="atm-section">
        <div class="atm-section-title">Active Tokens</div>
        <div id="tokenList"></div>
    </div>
</div>

<div class="atm-toast" id="atmToast"></div>

<script>
const API = '/api/loop/auditor-tokens/';

async function api(url, opts = {}) {
    const headers = { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() };
    return (await fetch(url, { headers, ...opts })).json();
}
function getCsrf() { const m = document.cookie.match(/csrftoken=([^;]+)/); return m ? m[1] : ''; }

async function init() { await refreshTokens(); }

async function refreshTokens() {
    const data = await api(API);
    const list = document.getElementById('tokenList');
    const tokens = data.tokens || [];

    if (tokens.length === 0) {
        list.innerHTML = '<div class="atm-empty">No tokens yet. Generate one above.</div>';
        return;
    }

    list.innerHTML = tokens.map(t => {
        const statusCls = t.revoked_at ? 'revoked' : t.is_valid ? 'valid' : 'expired';
        const statusLabel = t.revoked_at ? 'Revoked' : t.is_valid ? 'Active' : 'Expired';
        const fullUrl = window.location.origin + t.portal_url;

        return `<div class="atm-token">
            <div class="atm-token-header">
                <div>
                    <span class="atm-token-label">${esc(t.label)}</span>
                    <span class="atm-badge ${statusCls}">${statusLabel}</span>
                </div>
                ${t.is_valid ? `<button class="atm-btn danger sm" onclick="revokeToken('${t.id}')">Revoke</button>` : ''}
            </div>
            <div class="atm-token-meta">
                <span>Expires ${t.expires_at.slice(0, 10)}</span>
                <span>Accessed ${t.access_count} time${t.access_count !== 1 ? 's' : ''}</span>
                ${t.last_accessed_at ? `<span>Last: ${t.last_accessed_at.slice(0, 10)}</span>` : ''}
                <span>Created ${t.created_at.slice(0, 10)}</span>
            </div>
            ${t.is_valid ? `<div class="atm-token-url">
                <input value="${fullUrl}" readonly onclick="this.select()">
                <button onclick="copyUrl('${fullUrl}')">Copy</button>
            </div>` : ''}
        </div>`;
    }).join('');
}

async function createToken() {
    const label = document.getElementById('newLabel').value.trim();
    const days = parseInt(document.getElementById('newDays').value) || 30;
    if (!label) { toast('Label is required'); return; }

    const result = await api(API, {
        method: 'POST',
        body: JSON.stringify({ label, expires_days: days }),
    });

    if (result.error) { toast(result.error); return; }

    document.getElementById('newLabel').value = '';
    toast('Token generated');
    await refreshTokens();
}

async function revokeToken(id) {
    await api(API + id + '/', { method: 'DELETE' });
    toast('Token revoked');
    await refreshTokens();
}

function copyUrl(url) {
    navigator.clipboard.writeText(url).then(() => toast('Copied to clipboard'));
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function toast(msg) {
    const el = document.getElementById('atmToast');
    el.textContent = msg;
    el.className = 'atm-toast show';
    setTimeout(() => el.className = 'atm-toast', 3000);
}

init();
</script>
{% endblock %}
