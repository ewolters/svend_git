{% extends "base_app.html" %}
{% block title %}FMIS — Failure Modes Investigation System{% endblock %}

{% block extra_head %}
<style>
.fmis-app { padding: 24px; max-width: 1440px; margin: 0 auto; }
.fmis-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.fmis-header h1 { margin: 0; font-size: 22px; font-weight: 500; color: var(--text-primary); }
.fmis-header .subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

/* Methodology selector */
.fmis-methodology { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-secondary); }
.fmis-methodology select { padding: 4px 8px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 4px; color: var(--text-primary); font-size: 12px; }

/* Table */
.fmis-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.fmis-table th { text-align: left; padding: 10px 12px; color: var(--text-secondary); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
.fmis-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--text-primary); vertical-align: top; }
.fmis-table tr:hover td { background: var(--bg-hover); }
.fmis-table tr.expandable { cursor: pointer; }

/* Score cells */
.fmis-score { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; text-align: center; min-width: 36px; }
.fmis-score.unknown { color: var(--text-dim); font-style: italic; font-weight: 400; }
.fmis-rpn { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; text-align: center; }

/* Posterior bar — the visual differentiator */
.posterior-bar { margin-top: 4px; }
.posterior-bar-track { height: 6px; background: var(--border); border-radius: 3px; position: relative; overflow: visible; }
.posterior-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.posterior-bar-fill.detection { background: #60a5fa; }
.posterior-bar-fill.occurrence { background: #f87171; }
.posterior-bar-ci { position: absolute; top: -1px; height: 8px; background: rgba(255,255,255,0.15); border-radius: 2px; }
.posterior-bar-label { font-size: 10px; color: var(--text-dim); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }

/* Severity distribution */
.severity-dist { display: flex; gap: 2px; margin-top: 4px; height: 24px; align-items: flex-end; }
.severity-bar { flex: 1; border-radius: 2px 2px 0 0; min-width: 16px; transition: height 0.5s ease; }
.severity-bar.negligible { background: #4ade80; }
.severity-bar.minor { background: #60a5fa; }
.severity-bar.moderate { background: #facc15; }
.severity-bar.severe { background: #f97316; }
.severity-bar.catastrophic { background: #f87171; }
.severity-labels { display: flex; gap: 2px; font-size: 9px; color: var(--text-dim); }
.severity-labels span { flex: 1; text-align: center; min-width: 16px; }

/* Expanded row detail */
.fmis-detail { display: none; padding: 16px 12px; background: var(--bg-secondary); }
.fmis-detail.open { display: table-row; }
.fmis-detail td { padding: 16px; }
.fmis-detail-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.fmis-detail-section { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.fmis-detail-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }

/* Gap indicator */
.fmis-gap { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; background: rgba(250,204,21,0.15); color: #facc15; text-transform: uppercase; }

/* Evidence button */
.fmis-evidence-btn { padding: 4px 8px; font-size: 11px; background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
.fmis-evidence-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Buttons */
.fmis-btn { padding: 8px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); cursor: pointer; font-size: 13px; transition: all 0.15s; }
.fmis-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
.fmis-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
.fmis-btn.sm { padding: 4px 10px; font-size: 12px; }

/* Modal */
#fmisModal { display: none; position: fixed; inset: 0; z-index: 1000; align-items: center; justify-content: center; }
.fmis-modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
.fmis-modal-content { position: relative; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 90%; max-width: 560px; max-height: 80vh; overflow-y: auto; }
.fmis-modal-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; }
.fmis-input { width: 100%; padding: 8px 12px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); font-size: 13px; box-sizing: border-box; font-family: inherit; }
.fmis-input:focus { border-color: var(--accent); outline: none; }
textarea.fmis-input { resize: vertical; min-height: 60px; }
</style>
{% endblock %}

{% block content %}
<div class="fmis-app" id="fmisApp">
    <div class="fmis-header">
        <div>
            <h1 id="fmisTitle">Loading...</h1>
            <div class="subtitle" id="fmisSubtitle"></div>
        </div>
        <div style="display:flex; gap:8px; align-items:center;">
            <div class="fmis-methodology">
                <span>Methodology:</span>
                <span id="fmisMethodology"></span>
            </div>
            <button class="fmis-btn" onclick="addRow()">+ Add Failure Mode</button>
            <button class="fmis-btn sm" onclick="window.location='/app/loop/'">← Dashboard</button>
        </div>
    </div>

    <table class="fmis-table">
        <thead>
            <tr>
                <th style="width:20%">Failure Mode</th>
                <th style="width:15%">Effect</th>
                <th style="width:15%">Cause</th>
                <th style="width:12%">Severity</th>
                <th style="width:12%">Occurrence</th>
                <th style="width:12%">Detection</th>
                <th style="width:7%">RPN</th>
                <th style="width:7%">Status</th>
            </tr>
        </thead>
        <tbody id="fmisRows"></tbody>
    </table>
</div>

<script>
const FMIS_ID = window.location.pathname.match(/fmis\/([\w-]+)/)?.[1];
const LOOP_API = '/api/loop';
const CSRF = '{{ csrf_token }}';

let fmisData = null;

async function loadFMIS() {
    if (!FMIS_ID) return;
    const data = await apiFetch(`${LOOP_API}/fmis/${FMIS_ID}/`);
    fmisData = data;
    renderFMIS(data);
}

function renderFMIS(data) {
    document.getElementById('fmisTitle').textContent = `FMIS: ${data.fmis.title}`;
    document.getElementById('fmisSubtitle').textContent = data.fmis.description || '';
    document.getElementById('fmisMethodology').textContent = data.fmis.methodology.replace(/_/g, ' ');

    const tbody = document.getElementById('fmisRows');
    if (!data.rows.length) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:40px; color:var(--text-dim);">
            <div style="font-size:24px; opacity:0.3; margin-bottom:8px;">◉</div>
            No failure modes yet. Click "+ Add Failure Mode" to begin.
        </td></tr>`;
        return;
    }

    tbody.innerHTML = data.rows.map((r, i) => `
        <tr class="expandable" onclick="toggleDetail('${r.id}')">
            <td>
                <div style="font-weight:500;">${esc(r.failure_mode_text)}</div>
                ${r.undefined_terms.length ? `<span class="fmis-gap">${r.undefined_terms.length} undefined</span>` : ''}
            </td>
            <td>${esc(r.effect_text)}</td>
            <td>${esc(r.cause_text)}</td>
            <td>
                <div class="fmis-score${r.severity_score === null ? ' unknown' : ''}">${r.severity_score ?? '??'}</div>
                ${r.severity_distribution ? renderSeverityDist(r.severity_distribution) : ''}
            </td>
            <td>
                <div class="fmis-score${r.occurrence_score === null ? ' unknown' : ''}">${r.occurrence_score ?? '??'}</div>
                ${renderPosteriorBar(r.occurrence_rate, r.occurrence_ci, 'occurrence', r.occurrence_failures + '/' + r.occurrence_units)}
            </td>
            <td>
                <div class="fmis-score${r.detection_score === null ? ' unknown' : ''}">${r.detection_score ?? '??'}</div>
                ${renderPosteriorBar(r.detection_rate, r.detection_ci, 'detection', r.detection_detected + '/' + r.detection_injected)}
            </td>
            <td><div class="fmis-rpn">${r.rpn || '—'}</div></td>
            <td>${r.last_evidence_date ? '<span style="color:#4ade80;font-size:11px;">Data</span>' : '<span style="color:var(--text-dim);font-size:11px;">Manual</span>'}</td>
        </tr>
        <tr class="fmis-detail" id="detail-${r.id}">
            <td colspan="8">
                <div class="fmis-detail-grid">
                    ${renderDetailSection('Severity (Dirichlet)', r, 'severity')}
                    ${renderDetailSection('Occurrence (Beta)', r, 'occurrence')}
                    ${renderDetailSection('Detection (Beta)', r, 'detection')}
                </div>
                <div style="margin-top:12px; display:flex; gap:8px;">
                    <button class="fmis-evidence-btn" onclick="event.stopPropagation(); addEvidence('${r.id}', 'severity')">+ Severity Observation</button>
                    <button class="fmis-evidence-btn" onclick="event.stopPropagation(); addEvidence('${r.id}', 'occurrence')">+ Occurrence Data</button>
                    <button class="fmis-evidence-btn" onclick="event.stopPropagation(); addEvidence('${r.id}', 'detection')">+ Detection Test</button>
                </div>
            </td>
        </tr>
    `).join('');
}

function renderSeverityDist(dist) {
    if (!dist) return '';
    const cats = ['negligible', 'minor', 'moderate', 'severe', 'catastrophic'];
    const maxP = Math.max(...cats.map(c => dist[c] || 0));
    const bars = cats.map(c => {
        const p = dist[c] || 0;
        const h = maxP > 0 ? (p / maxP) * 20 : 0;
        return `<div class="severity-bar ${c}" style="height:${Math.max(2, h)}px;" title="${c}: ${(p*100).toFixed(0)}%"></div>`;
    }).join('');
    const labels = cats.map(c => `<span>${(dist[c]*100).toFixed(0)}</span>`).join('');
    return `<div class="severity-dist">${bars}</div><div class="severity-labels">${labels}</div>`;
}

function renderPosteriorBar(rate, ci, type, label) {
    if (rate === undefined || rate === null) return '';
    const pct = (rate * 100).toFixed(1);
    const ciLow = ci ? (ci[0] * 100) : 0;
    const ciHigh = ci ? (ci[1] * 100) : 100;
    return `<div class="posterior-bar">
        <div class="posterior-bar-track">
            <div class="posterior-bar-fill ${type}" style="width:${pct}%"></div>
            <div class="posterior-bar-ci" style="left:${ciLow}%; width:${ciHigh - ciLow}%;"></div>
        </div>
        <div class="posterior-bar-label">${pct}% [${ci ? ci[0].toFixed(2) : '?'}, ${ci ? ci[1].toFixed(2) : '?'}] · ${label}</div>
    </div>`;
}

function renderDetailSection(title, row, dim) {
    let content = '';
    if (dim === 'severity') {
        const method = row.severity_method;
        const manual = row.severity_manual;
        content = `<div>Method: <strong>${method}</strong></div>`;
        if (manual !== null) content += `<div>Manual score: ${manual}</div>`;
        if (row.severity_distribution) {
            content += `<div style="margin-top:8px;">Distribution:</div>`;
            for (const [cat, prob] of Object.entries(row.severity_distribution)) {
                const w = (prob * 100).toFixed(0);
                content += `<div style="display:flex;align-items:center;gap:4px;font-size:11px;margin-top:2px;">
                    <span style="width:70px;color:var(--text-dim);">${cat}</span>
                    <div style="flex:1;height:4px;background:var(--border);border-radius:2px;">
                        <div style="height:100%;width:${w}%;background:var(--accent);border-radius:2px;"></div>
                    </div>
                    <span style="width:30px;text-align:right;font-family:'JetBrains Mono',monospace;">${w}%</span>
                </div>`;
            }
        }
    } else if (dim === 'occurrence') {
        content = `<div>Method: <strong>${row.occurrence_method}</strong></div>
            <div>Rate: ${(row.occurrence_rate * 100).toFixed(2)}%</div>
            <div>CI: [${row.occurrence_ci[0].toFixed(3)}, ${row.occurrence_ci[1].toFixed(3)}]</div>
            <div>Data: ${row.occurrence_failures} failures / ${row.occurrence_units} units</div>`;
    } else if (dim === 'detection') {
        content = `<div>Method: <strong>${row.detection_method}</strong></div>
            <div>Rate: ${(row.detection_rate * 100).toFixed(2)}%</div>
            <div>CI: [${row.detection_ci[0].toFixed(3)}, ${row.detection_ci[1].toFixed(3)}]</div>
            <div>Data: ${row.detection_detected} detected / ${row.detection_injected} injected</div>`;
    }
    return `<div class="fmis-detail-section">
        <div class="fmis-detail-section-title">${title}</div>
        <div style="font-size:12px; color:var(--text-secondary);">${content}</div>
    </div>`;
}

function toggleDetail(rowId) {
    const el = document.getElementById(`detail-${rowId}`);
    if (el) el.classList.toggle('open');
}

// =============================================================================
// ACTIONS
// =============================================================================

function addRow() {
    showModal('Add Failure Mode', `
        <div style="display:grid; gap:12px;">
            <input id="fm-text" class="fmis-input" placeholder="Failure mode (what can go wrong?)" autofocus>
            <input id="fm-effect" class="fmis-input" placeholder="Effect (what happens if it fails?)">
            <input id="fm-cause" class="fmis-input" placeholder="Cause mechanism">
            <input id="fm-prevention" class="fmis-input" placeholder="Prevention control">
            <input id="fm-detection" class="fmis-input" placeholder="Detection control">
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;">
                <div><label style="font-size:10px;color:var(--text-dim);text-transform:uppercase;">Severity (1-10)</label>
                    <input id="fm-sev" class="fmis-input" type="number" min="1" max="10" placeholder="—"></div>
                <div><label style="font-size:10px;color:var(--text-dim);text-transform:uppercase;">Occurrence (1-10)</label>
                    <input id="fm-occ" class="fmis-input" type="number" min="1" max="10" placeholder="—"></div>
                <div><label style="font-size:10px;color:var(--text-dim);text-transform:uppercase;">Detection (1-10)</label>
                    <input id="fm-det" class="fmis-input" type="number" min="1" max="10" placeholder="—"></div>
            </div>
        </div>
    `, async () => {
        const fm = document.getElementById('fm-text').value.trim();
        if (!fm) return;
        await apiFetch(`${LOOP_API}/fmis/${FMIS_ID}/rows/`, 'POST', {
            failure_mode_text: fm,
            effect_text: document.getElementById('fm-effect').value,
            cause_text: document.getElementById('fm-cause').value,
            prevention_control: document.getElementById('fm-prevention').value,
            detection_control: document.getElementById('fm-detection').value,
            severity_manual: parseInt(document.getElementById('fm-sev').value) || null,
            occurrence_manual: parseInt(document.getElementById('fm-occ').value) || null,
            detection_manual: parseInt(document.getElementById('fm-det').value) || null,
        });
        closeModal();
        loadFMIS();
    });
}

function addEvidence(rowId, type) {
    if (type === 'severity') {
        showModal('Add Severity Observation', `
            <div style="display:grid; gap:8px;">
                <div style="font-size:12px; color:var(--text-secondary);">Classify the consequence of this failure mode observation:</div>
                ${['negligible', 'minor', 'moderate', 'severe', 'catastrophic'].map(c => `
                    <button class="fmis-btn" style="text-align:left;" onclick="submitSeverity('${rowId}', '${c}')"
                        >${c.charAt(0).toUpperCase() + c.slice(1)}</button>
                `).join('')}
            </div>
        `, null);
    } else if (type === 'occurrence') {
        showModal('Add Occurrence Data', `
            <div style="display:grid; gap:12px;">
                <div style="font-size:12px; color:var(--text-secondary);">How many failures in how many units?</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                    <div><label style="font-size:10px;color:var(--text-dim);">FAILURES</label>
                        <input id="occ-fail" class="fmis-input" type="number" min="0" value="0"></div>
                    <div><label style="font-size:10px;color:var(--text-dim);">UNITS OBSERVED</label>
                        <input id="occ-units" class="fmis-input" type="number" min="1" value="100"></div>
                </div>
            </div>
        `, async () => {
            const failures = parseInt(document.getElementById('occ-fail').value) || 0;
            const units = parseInt(document.getElementById('occ-units').value) || 0;
            if (units <= 0) return;
            await apiFetch(`${LOOP_API}/fmis/${FMIS_ID}/rows/${rowId}/posterior/`, 'POST', {
                type: 'occurrence', failures, units
            });
            closeModal();
            loadFMIS();
        });
    } else if (type === 'detection') {
        showModal('Add Detection Test Results', `
            <div style="display:grid; gap:12px;">
                <div style="font-size:12px; color:var(--text-secondary);">How many injected failures were detected?</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                    <div><label style="font-size:10px;color:var(--text-dim);">DETECTED</label>
                        <input id="det-detected" class="fmis-input" type="number" min="0" value="0"></div>
                    <div><label style="font-size:10px;color:var(--text-dim);">INJECTED</label>
                        <input id="det-injected" class="fmis-input" type="number" min="1" value="8"></div>
                </div>
            </div>
        `, async () => {
            const detected = parseInt(document.getElementById('det-detected').value) || 0;
            const injected = parseInt(document.getElementById('det-injected').value) || 0;
            if (injected <= 0) return;
            await apiFetch(`${LOOP_API}/fmis/${FMIS_ID}/rows/${rowId}/posterior/`, 'POST', {
                type: 'detection', detected, injected
            });
            closeModal();
            loadFMIS();
        });
    }
}

async function submitSeverity(rowId, category) {
    await apiFetch(`${LOOP_API}/fmis/${FMIS_ID}/rows/${rowId}/posterior/`, 'POST', {
        type: 'severity', category
    });
    closeModal();
    loadFMIS();
}

// =============================================================================
// UTILITIES
// =============================================================================

async function apiFetch(url, method = 'GET', body = null) {
    const opts = { method, headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF } };
    if (body) opts.body = JSON.stringify(body);
    const resp = await fetch(url, opts);
    return resp.json();
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function showModal(title, body, onConfirm) {
    let m = document.getElementById('fmisModal');
    if (!m) {
        m = document.createElement('div'); m.id = 'fmisModal';
        m.innerHTML = `<div class="fmis-modal-overlay" onclick="closeModal()"></div>
            <div class="fmis-modal-content">
                <div class="fmis-modal-title" id="fmisModalTitle"></div>
                <div id="fmisModalBody"></div>
                <div id="fmisModalFooter" style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;"></div>
            </div>`;
        document.body.appendChild(m);
    }
    document.getElementById('fmisModalTitle').textContent = title;
    document.getElementById('fmisModalBody').innerHTML = body;
    document.getElementById('fmisModalFooter').innerHTML = onConfirm ? '<button class="fmis-btn primary" id="fmisModalConfirm">Add</button>' : '';
    if (onConfirm) document.getElementById('fmisModalConfirm').onclick = onConfirm;
    m.style.display = 'flex';
    setTimeout(() => { const i = m.querySelector('input,textarea'); if(i) i.focus(); }, 50);
}
function closeModal() { const m = document.getElementById('fmisModal'); if(m) m.style.display='none'; }

document.addEventListener('DOMContentLoaded', loadFMIS);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
{% endblock %}
