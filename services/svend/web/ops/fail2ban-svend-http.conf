# Fail2ban filter + jail for Svend HTTP active defense (Варта)
#
# Watches /var/log/svend/varta.log for security events logged by
# the VartaMiddleware and honeypot handlers.
#
# Install:
#   sudo cp fail2ban-svend-http.conf /etc/fail2ban/filter.d/svend-varta.conf
#   Then add the jail below to /etc/fail2ban/jail.local
#
# === FILTER (copy to /etc/fail2ban/filter.d/svend-varta.conf) ===
#
# [Definition]
# failregex = \[VARTA\] ip=<HOST> action=\S+ score=\S+ detail=.*$
# ignoreregex =
# datepattern = %%Y-%%m-%%d %%H:%%M:%%S
#
# === JAIL (append to /etc/fail2ban/jail.local) ===
#
# [svend-varta]
# enabled = true
# port = http,https
# filter = svend-varta
# logpath = /var/log/svend/varta.log
# maxretry = 3
# findtime = 15m
# bantime = 6h
# action = iptables-multiport[name=svend-varta, port="http,https"]
#
# NOTE: maxretry=3 means an IP needs 3 separate VARTA events in 15 min
# before getting banned. Single honeypot hit won't ban — gives tolerance
# for false positives. Ban is 6h (not permanent) for self-recovery.

# ── Standalone filter file (for /etc/fail2ban/filter.d/) ─────────

[Definition]
failregex = \[VARTA\] ip=<HOST> action=\S+ score=\S+ detail=.*$
ignoreregex =
datepattern = %%Y-%%m-%%d %%H:%%M:%%S
