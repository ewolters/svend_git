{% extends "base_app.html" %}
{% block title %}Loop - SVEND{% endblock %}
{% block container_class %}sv-full{% endblock %}

{% block extra_head %}
<style>
body > main { padding: 0 !important; }
body > main > .container { max-width: none !important; padding: 0 !important; }

/* ── Layout: sidebar + list + detail ── */
.loop-layout {
    display: grid;
    grid-template-columns: 48px 280px 1fr;
    height: calc(100vh - 56px);
    overflow: hidden;
}
@media (max-width: 900px) {
    .loop-layout { grid-template-columns: 48px 1fr; }
    .loop-rail { display: none; }
}

/* ── Mode sidebar (VS Code activity bar) ── */
.loop-sidebar {
    background: var(--bg-primary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0;
    gap: 2px;
}

.loop-mode-btn {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: var(--radius-sm);
    position: relative;
    transition: color 0.15s, background 0.15s;
}
.loop-mode-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
.loop-mode-btn.active { color: var(--accent-primary); background: var(--accent-primary-dim); }
.loop-mode-btn.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 6px;
    bottom: 6px;
    width: 2px;
    background: var(--accent-primary);
    border-radius: 0 1px 1px 0;
}
.loop-mode-btn svg { width: 18px; height: 18px; }

.loop-mode-badge {
    position: absolute;
    top: 2px;
    right: 2px;
    min-width: 14px;
    height: 14px;
    padding: 0 3px;
    font-size: 9px;
    font-weight: 600;
    line-height: 14px;
    text-align: center;
    border-radius: 9999px;
    background: var(--error);
    color: #fff;
}

.loop-sidebar-spacer { flex: 1; }

/* ── List rail ── */
.loop-rail {
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.loop-rail-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
}

.loop-rail-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    font-family: var(--font-label);
}

.loop-rail-filters {
    padding: 6px 10px 4px;
    border-bottom: 1px solid var(--border);
}

.loop-rail-list {
    flex: 1;
    overflow-y: auto;
}

/* ── Detail panel ── */
.loop-detail {
    padding: 24px 28px;
    overflow-y: auto;
}

.loop-detail.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 13px;
}

.loop-detail-header { margin-bottom: 20px; }
.loop-detail-header h2 {
    margin: 0 0 8px 0;
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
}

.loop-detail-meta {
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    flex-wrap: wrap;
}

.loop-detail-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
}

/* ── Section dividers ── */
.loop-section {
    margin-top: 24px;
}

.loop-section-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    font-family: var(--font-label);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
}

/* ── Mode content containers ── */
.loop-mode-content { display: none; }
.loop-mode-content.active {
    display: contents;
}
</style>
{% endblock %}

{% block content %}
<div class="loop-layout">
    <!-- ── Mode sidebar ── -->
    <div class="loop-sidebar">
        <button class="loop-mode-btn active" data-mode="detect" title="Detect — Signals">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5.64 19.36a9 9 0 0 1 0-12.73"/><path d="M18.36 6.64a9 9 0 0 1 0 12.73"/>
                <path d="M8.46 16.54a5 5 0 0 1 0-7.07"/><path d="M15.54 9.46a5 5 0 0 1 0 7.07"/>
                <circle cx="12" cy="12" r="1"/>
            </svg>
            <span class="loop-mode-badge" id="badgeDetect" style="display:none;"></span>
        </button>

        <button class="loop-mode-btn" data-mode="investigate" title="Investigate">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
        </button>

        <button class="loop-mode-btn" data-mode="standardize" title="Standardize — Documents">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
            </svg>
        </button>

        <button class="loop-mode-btn" data-mode="verify" title="Verify — PCs &amp; FFTs">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <polyline points="9 12 11.5 14.5 15.5 9.5"/>
            </svg>
        </button>

        <button class="loop-mode-btn" data-mode="suppliers" title="Suppliers">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/>
                <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
            </svg>
        </button>

        <div class="loop-sidebar-spacer"></div>

        <button class="loop-mode-btn" data-mode="policies" title="Policies">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
        </button>
    </div>

    <!-- ── List rail (content swaps per mode) ── -->
    <div class="loop-rail" id="loopRail">
        <div class="loop-rail-header">
            <span class="loop-rail-title" id="loopRailTitle">Signals</span>
            <button class="sv-btn sv-btn-primary sv-btn-sm" id="loopRailCreate" onclick="loopCreate()">+ New</button>
        </div>
        <div class="loop-rail-filters" id="loopRailFilters">
            <div class="sv-filter-bar">
                <button class="sv-filter-btn active" onclick="loopFilter(this,'all')">All</button>
                <button class="sv-filter-btn" onclick="loopFilter(this,'untriaged')">Untriaged</button>
                <button class="sv-filter-btn" onclick="loopFilter(this,'acknowledged')">Ack'd</button>
                <button class="sv-filter-btn" onclick="loopFilter(this,'investigating')">Active</button>
            </div>
        </div>
        <div class="loop-rail-list" id="loopRailList">
            <div class="sv-empty">Loading...</div>
        </div>
    </div>

    <!-- ── Detail panel ── -->
    <div class="loop-detail empty" id="loopDetail">
        Select a signal to view details
    </div>
</div>

<script>
(function() {
    'use strict';

    const API = '/api/loop/';
    let currentMode = 'detect';
    let signals = [];
    let selectedId = null;
    let currentFilter = 'all';

    // ── Mode switching ──
    document.querySelectorAll('.loop-mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const mode = btn.dataset.mode;
            if (mode === currentMode) return;

            document.querySelector('.loop-mode-btn.active')?.classList.remove('active');
            btn.classList.add('active');
            currentMode = mode;

            if (mode === 'detect') {
                loadSignals();
                document.getElementById('loopRailTitle').textContent = 'Signals';
                document.getElementById('loopRailCreate').style.display = '';
                showDetectFilters();
            } else {
                document.getElementById('loopRailTitle').textContent = mode.charAt(0).toUpperCase() + mode.slice(1);
                document.getElementById('loopRailCreate').style.display = 'none';
                document.getElementById('loopRailList').innerHTML = '<div class="sv-empty" style="padding:32px;text-align:center;color:var(--text-dim);font-size:12px;">Coming soon</div>';
                document.getElementById('loopRailFilters').innerHTML = '';
                document.getElementById('loopDetail').innerHTML = 'Select a mode to begin';
                document.getElementById('loopDetail').classList.add('empty');
            }
        });
    });

    function showDetectFilters() {
        document.getElementById('loopRailFilters').innerHTML = `
            <div class="sv-filter-bar">
                <button class="sv-filter-btn ${currentFilter==='all'?'active':''}" onclick="loopFilter(this,'all')">All</button>
                <button class="sv-filter-btn ${currentFilter==='untriaged'?'active':''}" onclick="loopFilter(this,'untriaged')">Untriaged</button>
                <button class="sv-filter-btn ${currentFilter==='acknowledged'?'active':''}" onclick="loopFilter(this,'acknowledged')">Ack'd</button>
                <button class="sv-filter-btn ${currentFilter==='investigating'?'active':''}" onclick="loopFilter(this,'investigating')">Active</button>
            </div>
        `;
    }

    // ── Filter ──
    window.loopFilter = function(el, filter) {
        currentFilter = filter;
        el.closest('.sv-filter-bar').querySelectorAll('.sv-filter-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        renderSignalList();
    };

    // ── Load signals ──
    async function loadSignals() {
        try {
            const resp = await fetch(API + 'signals/');
            const data = await resp.json();
            signals = data.signals || [];
            updateBadge();
            renderSignalList();
        } catch (e) {
            document.getElementById('loopRailList').innerHTML = '<div class="sv-empty" style="padding:24px;text-align:center;color:var(--error);">Failed to load signals</div>';
        }
    }

    function updateBadge() {
        const untriaged = signals.filter(s => s.triage_state === 'untriaged').length;
        const badge = document.getElementById('badgeDetect');
        if (untriaged > 0) {
            badge.textContent = untriaged;
            badge.style.display = '';
        } else {
            badge.style.display = 'none';
        }
    }

    // ── Render signal list ──
    function renderSignalList() {
        const list = document.getElementById('loopRailList');
        let filtered = signals;
        if (currentFilter !== 'all') {
            filtered = signals.filter(s => s.triage_state === currentFilter);
        }

        if (!filtered.length) {
            list.innerHTML = '<div class="sv-empty" style="padding:32px;text-align:center;color:var(--text-dim);font-size:12px;">No signals</div>';
            return;
        }

        const severityColor = { critical: 'red', warning: 'amber', info: 'blue' };

        list.innerHTML = filtered.map(s => `
            <div class="sv-list-item${s.id === selectedId ? ' selected' : ''}"
                 onclick="loopSelectSignal('${s.id}')">
                <div class="sv-dot sv-dot-${severityColor[s.severity] || 'dim'}"></div>
                <div style="flex:1;min-width:0;">
                    <div style="font-size:13px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(s.title)}</div>
                    <div style="font-size:10px;color:var(--text-dim);margin-top:2px;display:flex;gap:6px;align-items:center;">
                        <span class="sv-badge sv-badge-${severityColor[s.severity] || 'dim'}" style="font-size:8px;">${esc(s.source_type || 'signal')}</span>
                        <span>${timeAgo(s.created_at)}</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // ── Select signal ──
    window.loopSelectSignal = function(id) {
        selectedId = id;
        renderSignalList();

        const s = signals.find(x => x.id === id);
        if (!s) return;

        const panel = document.getElementById('loopDetail');
        panel.classList.remove('empty');

        const severityColor = { critical: 'red', warning: 'amber', info: 'blue' };
        const stateLabels = { untriaged: 'Untriaged', acknowledged: 'Acknowledged', investigating: 'Investigating', resolved: 'Resolved', dismissed: 'Dismissed' };

        panel.innerHTML = `
            <div class="loop-detail-header">
                <h2>${esc(s.title)}</h2>
                <div class="loop-detail-meta">
                    <span class="sv-badge sv-badge-${severityColor[s.severity] || 'dim'}">${esc(s.severity)}</span>
                    <span class="sv-badge">${esc(s.source_type || 'signal')}</span>
                    <span class="sv-badge">${esc(stateLabels[s.triage_state] || s.triage_state)}</span>
                    <span>${timeAgo(s.created_at)}</span>
                </div>
            </div>

            ${s.description ? `<div style="font-size:13px;line-height:1.6;color:var(--text-secondary);margin-bottom:20px;">${esc(s.description)}</div>` : ''}

            <div class="loop-detail-actions" id="signalActions">
                ${s.triage_state === 'untriaged' ? `
                    <button class="sv-btn" onclick="triageSignal('${s.id}','acknowledge')">Acknowledge</button>
                    <button class="sv-btn sv-btn-primary" onclick="triageSignal('${s.id}','investigate')">Open Investigation</button>
                    <button class="sv-btn sv-btn-danger" onclick="triageSignal('${s.id}','dismiss')">Dismiss</button>
                ` : ''}
                ${s.triage_state === 'acknowledged' ? `
                    <button class="sv-btn sv-btn-primary" onclick="triageSignal('${s.id}','investigate')">Open Investigation</button>
                    <button class="sv-btn sv-btn-danger" onclick="triageSignal('${s.id}','dismiss')">Dismiss</button>
                ` : ''}
            </div>

            <div class="loop-section">
                <div class="loop-section-title">Details</div>
                <div class="sv-detail-grid">
                    <div><span class="sv-detail-label">Created</span><span class="sv-detail-value">${s.created_at ? new Date(s.created_at).toLocaleString() : '—'}</span></div>
                    <div><span class="sv-detail-label">Source</span><span class="sv-detail-value">${esc(s.source_type || '—')}</span></div>
                    ${s.triaged_at ? `<div><span class="sv-detail-label">Triaged</span><span class="sv-detail-value">${new Date(s.triaged_at).toLocaleString()}</span></div>` : ''}
                    ${s.resolved_at ? `<div><span class="sv-detail-label">Resolved</span><span class="sv-detail-value">${new Date(s.resolved_at).toLocaleString()}</span></div>` : ''}
                </div>
            </div>
        `;
    };

    // ── Triage actions ──
    window.triageSignal = async function(id, action) {
        const payloads = {
            acknowledge: { action: 'acknowledge' },
            investigate: { action: 'open_investigation' },
            dismiss: { action: 'dismiss', reason: 'Dismissed from triage' },
        };

        try {
            const resp = await fetch(API + 'signals/' + id + '/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payloads[action]),
            });

            if (resp.ok) {
                await loadSignals();
                // Auto-advance to next signal
                const filtered = currentFilter === 'all' ? signals : signals.filter(s => s.triage_state === currentFilter);
                if (filtered.length) {
                    loopSelectSignal(filtered[0].id);
                } else {
                    document.getElementById('loopDetail').innerHTML = 'No more signals to triage';
                    document.getElementById('loopDetail').classList.add('empty');
                    selectedId = null;
                }
            }
        } catch (e) {
            console.error('Triage failed:', e);
        }
    };

    // ── Create signal ──
    window.loopCreate = function() {
        SvModal.create({
            title: 'New Signal',
            fields: [
                { name: 'title', label: 'Title', type: 'text', required: true },
                { name: 'description', label: 'Description', type: 'textarea' },
                { name: 'source_type', label: 'Source', type: 'select', options: [
                    { value: 'operator_report', label: 'Operator Report' },
                    { value: 'customer_complaint', label: 'Customer Complaint' },
                    { value: 'spc_violation', label: 'SPC Violation' },
                    { value: 'audit_finding', label: 'Audit Finding' },
                    { value: 'supplier_issue', label: 'Supplier Issue' },
                    { value: 'other', label: 'Other' },
                ]},
                { name: 'severity', label: 'Severity', type: 'select', options: [
                    { value: 'info', label: 'Info' },
                    { value: 'warning', label: 'Warning' },
                    { value: 'critical', label: 'Critical' },
                ]},
            ],
            onSubmit: async (data) => {
                const resp = await fetch(API + 'signals/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });
                if (resp.ok) {
                    await loadSignals();
                }
            },
        });
    };

    // ── Keyboard shortcuts ──
    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
        if (document.getElementById('cmdPalette')?.style.display === 'flex') return;
        if (currentMode !== 'detect' || !selectedId) return;

        const s = signals.find(x => x.id === selectedId);
        if (!s) return;

        if (e.key === 'a' && s.triage_state === 'untriaged') {
            e.preventDefault();
            triageSignal(selectedId, 'acknowledge');
        } else if (e.key === 'i' && (s.triage_state === 'untriaged' || s.triage_state === 'acknowledged')) {
            e.preventDefault();
            triageSignal(selectedId, 'investigate');
        } else if (e.key === 'd' && (s.triage_state === 'untriaged' || s.triage_state === 'acknowledged')) {
            e.preventDefault();
            triageSignal(selectedId, 'dismiss');
        } else if (e.key === 'ArrowDown' || e.key === 'j') {
            e.preventDefault();
            const filtered = currentFilter === 'all' ? signals : signals.filter(s => s.triage_state === currentFilter);
            const idx = filtered.findIndex(s => s.id === selectedId);
            if (idx < filtered.length - 1) loopSelectSignal(filtered[idx + 1].id);
        } else if (e.key === 'ArrowUp' || e.key === 'k') {
            e.preventDefault();
            const filtered = currentFilter === 'all' ? signals : signals.filter(s => s.triage_state === currentFilter);
            const idx = filtered.findIndex(s => s.id === selectedId);
            if (idx > 0) loopSelectSignal(filtered[idx - 1].id);
        }
    });

    // ── Init ──
    loadSignals();

})();
</script>
{% endblock %}
