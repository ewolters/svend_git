# Fail2ban filter for Svend HTTP active defense (Варта)
#
# Install filter:
#   sudo cp fail2ban-svend-http.conf /etc/fail2ban/filter.d/svend-varta.conf
#
# Then add this jail to /etc/fail2ban/jail.local:
#
#   [svend-varta]
#   enabled = true
#   port = http,https
#   filter = svend-varta
#   logpath = /var/log/svend/varta.log
#   maxretry = 3
#   findtime = 15m
#   bantime = 6h
#   action = iptables-multiport[name=svend-varta, port="http,https"]

[Definition]
failregex = \[VARTA\] ip=<HOST> action=\S+ score=\S+ detail=.*$
ignoreregex =
datepattern = %%Y-%%m-%%d %%H:%%M:%%S
